name: Generate Action Code
description: Generates the action code

runs:
  using: composite
  steps:
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24
        check-latest: true
        cache: npm
    - name: Generate action code
      shell: bash
      run: |
        npm clean-install
        npm run build
        npm run pack
